<style>
:root{
  --bg:#161616;
  --tw:365px; --th:320px;      /* 타일 표시 크기 */
  --drift:24s;
  --magenta:#FF2E92;
  --txt:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--txt);
  min-height:100dvh;display:flex;flex-direction:column}
a{color:inherit}

/* ── Hero ───────────────────────── */
.hero{position:relative;overflow:hidden;
  display:flex;flex-direction:column;flex:1;min-height:0}
.bg{position:fixed;inset:-40%;z-index:-1;
  background:url("bg_pattern.png") repeat;
  background-size:var(--tw) var(--th);
  animation:drift var(--drift) linear infinite;will-change:background-position}
@keyframes drift{from{background-position:0 0}to{background-position:calc(-1*var(--tw)) calc(-1*var(--th))}}

/* ── BB 라인업 + 로고 스티커: 한 덩어리 ── */
.hero-visual{position:relative;width:0;height:492px;   /* 라인업 기준 고정 박스 */
  margin-bottom:clamp(88px,14vh,150px)}
.lineup{position:absolute;left:50%;bottom:-28px;transform:translateX(-50%);
  height:520px;display:flex;align-items:flex-end;   /* 기존 1500px 라인업과 동일 높이 */
  pointer-events:none;user-select:none}
.bb-a{display:block;height:100%;margin:0 -75px;   /* 어깨 겹침 정도 */
  animation:bbpop .55s cubic-bezier(.3,1.5,.4,1) calc(.15s + var(--d)) both,
            bbob 3.4s ease-in-out calc(1s + var(--d)*3) infinite}
.bb-a:nth-child(6){margin-left:-20px}
.bb-a img{height:100%;width:auto;display:block;pointer-events:auto;
  transition:transform .3s cubic-bezier(.3,1.6,.4,1)}
.bb-a:hover img{transform:translateY(-18px)}   /* 호버: 폴짝 */
@keyframes bbpop{from{opacity:0;transform:translateY(70px)}to{opacity:1;transform:none}}
@keyframes bbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
/* 호버/탭 시 머리 위 이모지 팝 */
.bb-a{position:relative}
.emo{position:absolute;left:50%;top:4%;font-size:34px;line-height:1;
  pointer-events:none;z-index:5;
  animation:emoFly .95s ease-out forwards}
@keyframes emoFly{
  0%{opacity:0;transform:translate(-50%,14px) scale(.4)}
  18%{opacity:1;transform:translate(-50%,-10px) scale(1.15)}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx,0px)),-85px) scale(1) rotate(var(--rot,0deg))}
}
.sticker-pos{position:absolute;left:50%;bottom:170px;
  transform:translate(-50%,50%);   /* 스티커 비율이 달라도 세로 중심 고정 */
  width:min(400px,72vw)}
@media (max-width:720px){
  .hero-visual{height:84vw}
  .lineup{height:90vw;bottom:-6vw}
  .bb-a{margin:0 -13vw}
  .bb-a:nth-child(6){margin-left:-3.5vw}
  .sticker-pos{bottom:30vw}
}

/* ── Nav ────────────────────────── */
.nav{position:sticky;top:0;flex-shrink:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;gap:24px;
  padding:0 32px;height:64px;
  background:rgba(22,22,22,.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nav .logo img{height:20px;display:block;filter:invert(1)}
.nav-right{display:flex;align-items:center;gap:28px}
.nav-link{font-size:15px;font-weight:600;color:rgba(255,255,255,.7);
  text-decoration:none;transition:color .2s}
.nav-link:hover{color:#fff}
.nav-cta{padding:9px 20px;border-radius:999px;background:#fff;color:#111;
  font-size:14px;font-weight:700;text-decoration:none;white-space:nowrap;
  transition:transform .2s}
.nav-cta:hover{transform:translateY(-1px)}
@media (max-width:720px){.nav{padding:0 20px}.nav-right{gap:18px}}

.hero-inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:100px 24px 72px;gap:0}   /* 상단 100 = 하단 72 + 푸터 패딩 28 → 위아래 균형 */
.sticker{position:relative;display:block;width:100%;height:auto;
  filter:drop-shadow(0 16px 40px rgba(0,0,0,.45));transform-origin:center;
  animation:stamp .5s cubic-bezier(.3,1.4,.4,1) .45s both,
            wig 3.6s cubic-bezier(.5,.05,.3,1) 1.4s infinite}
@media (max-height:960px) and (min-width:721px){
  .bb-note{margin-bottom:30px}
}
@keyframes stamp{
  0%{opacity:0;transform:scale(1.5) rotate(-7deg)}
  60%{opacity:1;transform:scale(.96) rotate(1.5deg)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}
@keyframes fadeup{from{opacity:0;transform:translateY(14px)}to{transform:none}}
/* to에서 opacity 생략 → 각 요소의 원래 투명도(.sub .72, .bb-note .6)로 수렴 */
.hero-inner h1{animation:fadeup .5s ease .8s both}
.hero-inner .sub{animation:fadeup .5s ease .9s both}
.hero-inner .bb-note{animation:fadeup .5s ease .98s both}
.hero-inner .cta{animation:fadeup .5s ease 1.08s both}
@keyframes wig{
  0%,55%,100%{transform:rotate(0) scale(1)}
  58%{transform:rotate(0) scale(1.04,.95)}
  64%{transform:rotate(-3deg) scale(.97,1.04)}
  70%{transform:rotate(2.2deg) scale(1.02,.99)}
  76%{transform:rotate(-1.4deg)}
  82%{transform:rotate(.7deg)}
  88%{transform:rotate(0)}
}
h1{font-size:clamp(28px,4.2vw,48px);font-weight:800;line-height:1.25;
  margin-bottom:16px;word-break:keep-all}
.sub{font-size:clamp(15px,1.6vw,19px);font-weight:700;line-height:1.6;opacity:.72;
  margin-bottom:12px;word-break:keep-all}
.sub .nb{display:inline-block}   /* 좁은 화면에서 두 줄이 될 때 "나만의 카드~"가 통째로 다음 줄로 */
.bb-note{font-size:13px;font-weight:600;opacity:.6;margin-bottom:44px;word-break:keep-all}
.cta{display:inline-flex;align-items:center;gap:10px;padding:18px 40px;border-radius:999px;
  background:var(--txt);color:#111;font-size:18px;font-weight:900;text-decoration:none;
  box-shadow:0 10px 32px rgba(0,0,0,.4);transition:transform .2s,box-shadow .2s}
.cta:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(0,0,0,.5)}
.cta .arrow{transition:transform .2s}
.cta:hover .arrow{transform:translateX(4px)}

@media (prefers-reduced-motion:reduce){
  .bg,.sticker,.bb-a,.hero-inner h1,.hero-inner .sub,.hero-inner .bb-note,.hero-inner .cta{animation:none}
  .bb-a{opacity:1}
}

/* ── Floating social rail ───────── */
.social-rail{position:absolute;right:24px;bottom:24px;z-index:9;
  display:flex;flex-direction:column;gap:12px}
.social-rail a{display:flex;align-items:center;justify-content:center;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.08);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1);
  transition:background .2s,transform .2s}
.social-rail a:hover{background:rgba(255,255,255,.18);transform:translateX(-3px)}
.social-rail svg{width:18px;height:18px;fill:#fff;display:block}
@media (max-width:900px){.social-rail{display:none}}

/* ── Footer ─────────────────────── */
footer{padding:28px 24px;flex-shrink:0}
.social{display:flex;justify-content:center;gap:36px;margin-bottom:32px}
@media (min-width:901px){.social{display:none}}
.social a{opacity:.92;transition:opacity .2s,transform .2s;display:block}
.social a:hover{opacity:1;transform:translateY(-2px)}
.social svg{width:26px;height:26px;fill:#fff;display:block}
.legal{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;
  align-items:center;gap:24px;flex-wrap:wrap;
  font-size:14px;color:rgba(255,255,255,.55)}
.legal a{text-decoration:underline;text-underline-offset:3px}
.legal .row{display:contents}
@media (max-width:720px){
  .legal{flex-direction:column;align-items:flex-start;gap:12px}
  .legal .row{width:100%;display:flex;justify-content:space-between}
}
</style>

<script>
// 로고 스티커 7종 중 랜덤 등장
(function(){
  const n = Math.floor(Math.random()*7)+1;
  document.getElementById('stickerLogo').src =
    'sticker_logo_bunnybyte_0'+n+'.svg';
})();
// 비한국어 브라우저 → 랜딩 카피 영어로
(function(){
  if((navigator.language||'').toLowerCase().startsWith('ko'))return;
  document.documentElement.lang='en';
  document.querySelector('.hero-inner h1').innerHTML =
    'The more you play,<br>the more special your <span class="bb">BB</span>';
  document.querySelector('.sub').innerHTML =
    'Game with <span class="bb">BB</span>, achieve, <span class="nb">and create your own cards.</span>';
  document.querySelector('.bb-note').textContent =
    '*BB is your avatar in the bunnybyte world';
  document.querySelector('.cta').innerHTML =
    'Play bunnybyte <span class="arrow">→</span>';
})();
// 아바타 10명 셔플 → 왼쪽 5자리 / 오른쪽 5자리 랜덤 배치
(function(){
  const srcs = Array.from({length:10},(_,i)=>'bb'+String(i+1).padStart(2,'0')+'.png');
  for(let i=srcs.length-1;i>0;i--){          // Fisher–Yates 셔플
    const j = Math.floor(Math.random()*(i+1));
    [srcs[i],srcs[j]] = [srcs[j],srcs[i]];
  }
  document.querySelectorAll('.bb-a img').forEach((img,i)=>img.src = srcs[i]);
})();
// 아바타 호버/탭 → 머리 위 랜덤 이모지 팝
(function(){
  if(matchMedia('(prefers-reduced-motion:reduce)').matches)return;
  const EMO=['😆','🤩','😝','😎','🥳','😍','❤️','💖','🫶','✨','⚡','🔥'];
  document.querySelectorAll('.bb-a img').forEach(img=>{
    let last=0;
    img.addEventListener('pointerenter',()=>{
      const now=Date.now(); if(now-last<450)return; last=now;
      const s=document.createElement('span');
      s.className='emo';
      s.textContent=EMO[Math.floor(Math.random()*EMO.length)];
      s.style.setProperty('--dx',(Math.random()*60-30).toFixed(0)+'px');
      s.style.setProperty('--rot',(Math.random()*40-20).toFixed(0)+'deg');
      img.parentElement.appendChild(s);
      s.addEventListener('animationend',()=>s.remove());
    });
  });
})();
</script>
